name: Windows CMake Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            base-devel

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Refresh system vcpkg ports
        run: |
          cd $env:VCPKG_INSTALLATION_ROOT
          git pull
          .\bootstrap-vcpkg.bat
        shell: pwsh

      - name: Restore vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-bin-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-bin-${{ runner.os }}-

      - name: Create vcpkg cache directory
        run: mkdir -p C:\Users\runneradmin\AppData\Local\vcpkg\archives
        shell: pwsh

      - name: Configure with CMake
        run: |
          cmake --preset default `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
        shell: pwsh
        env:
          VCPKG_DEFAULT_BINARY_CACHE: 'C:\Users\runneradmin\AppData\Local\vcpkg\archives'

      - name: Build with CMake
        run: |
          cmake --build build
        env:
          VCPKG_DEFAULT_BINARY_CACHE: 'C:\Users\runneradmin\AppData\Local\vcpkg\archives'

      - name: Archive Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cbrutekrag-w64
          path: |
            build/src/cbrutekrag.exe
            build/src/libcrypto-3-x64.dll
            build/src/pthreadVC3.dll
            build/src/ssh.dll
